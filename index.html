        // Helper function to create dates preserving local timezone (MEJORADO)
        const createLocalDateTime = (dateStr, timeStr) => {
            // Crear fecha en timezone local sin conversión UTC automática
            const [year, month, day] = dateStr.split('-');
            const [hours, minutes] = timeStr.split(':');
            
            // Usar constructor de Date con valores individuales (evita parsing de string)
            const localDate = new Date(
                parseInt(year), 
                parseInt(month) - 1, // Mes base-0
                parseInt(day), 
                parseInt(hours), 
                parseInt(minutes), 
                0, 0 // segundos, milisegundos
            );
            
            console.log('🕐 Creando fecha local:', {
                input: `${dateStr} ${timeStr}`,
                output: localDate.toLocaleString(),
                iso: localDate.toISOString(),
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            });
            
            return localDate;
        };

        const formatCurrency = (value) => {
            const numValue = parseFloat(value) || 0;
            
            // Valores muy pequeños (< 0.01): buscar dígitos significativos, hasta 10 decimales
            if (numValue > 0 && numValue < 0.01) {
                const str = numValue.toString();
                const decimalPart = str.split('.')[1] || '';
                let significantDecimals = 0;
                
                for (let i = 0; i < decimalPart.length; i++) {
                    if (decimalPart[i] !== '0') {
                        significantDecimals = Math.min(i + 4, 10); // +4 dígitos tras el primero significativo, máx 10
                        break;
                    }
                }
                
                return new Intl.NumberFormat('es-ES', { 
                    style: 'currency', 
                    currency: 'USD',
                    minimumFractionDigits: significantDecimals,
                    maximumFractionDigits: significantDecimals
                }).format(numValue);
            }
            
            // Valores entre 0.01 y 1: 4 decimales (ej: 0.7816 en vez de 0.78)
            if (numValue > 0 && numValue < 1) {
                return new Intl.NumberFormat('es-ES', { 
                    style: 'currency', 
                    currency: 'USD',
                    minimumFractionDigits: 4,
                    maximumFractionDigits: 4
                }).format(numValue);
            }
            
            // Valores >= 1: 2 decimales (ej: 150.07)
            return new Intl.NumberFormat('es-ES', { 
                style: 'currency', 
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(numValue);
        };

                        .from('operations')
                        .select(`
                            id, crypto, type, operation_type, leverage,
                            status, created_at
                        `)
                        .eq('user_id', getCurrentUserId())
                        .eq('status', 'closed')
                        .order('created_at', { ascending: false });

                    if (closedError) throw closedError;

                    // Para cada operación cerrada, calcular valores reales consolidados
                    const consolidatedOps = [];
                    
                    for (const op of closedOpsData || []) {
                        // Obtener todas las entradas DCA de esta operación
                        const { data: entries, error: entriesError } = await supabaseClient
                            .from('entries')
                            .select('margin, executed, entry_price, units')
                            .eq('operation_id', op.id);

                        if (!entriesError && entries && entries.length > 0) {
                            // Calcular totales REALES de todas las entradas DCA
                            const totalRealMargin = entries.reduce((sum, entry) => sum + parseFloat(entry.margin || 0), 0);
                            const totalRealExecuted = entries.reduce((sum, entry) => sum + parseFloat(entry.executed || 0), 0);
                            const totalRealUnits = entries.reduce((sum, entry) => sum + parseFloat(entry.units || 0), 0);
                            const totalRealLeveraged = totalRealExecuted - totalRealMargin;
                            
                            // PEPP (Precio Entrada Promedio Ponderado) - CORREGIDO
                            const totalIPonderada = entries.reduce((sum, entry) => {
                                const executed = parseFloat(entry.executed || 0);
                                const price = parseFloat(entry.entry_price || 0);
                                return sum + (executed * price);
                            }, 0);
                            const pepp = totalRealExecuted > 0 ? totalIPonderada / totalRealExecuted : 0;

                            // Calcular fechas de apertura y cierre
                            const entryDates = entries.map(e => new Date(e.created_at)).sort((a, b) => a - b);
                            const openingDate = entryDates[0]; // Primera entrada DCA

                            // Buscar fecha del último TP ejecutado
                            const { data: executedTPs, error: tpError } = await supabaseClient
                                .from('take_profits')
                                .select('percentage, price, executed, created_at, profit, units_sold')
                                .eq('operation_id', op.id)
                                .eq('executed', true)
                                .order('created_at', { ascending: false });

                            let closingDate = openingDate;
                            let totalPnL = 0;
                            
                            if (!tpError && executedTPs && executedTPs.length > 0) {
                                const lastTPDate = executedTPs[0].created_at;
                                closingDate = lastTPDate && lastTPDate !== null 
                                    ? new Date(lastTPDate) 
                                    : new Date(op.created_at);
                                
                                // Usar profit guardado si existe, sino recalcular (datos legacy)
                                totalPnL = executedTPs.reduce((sum, tp) => {
                                    if (tp.profit !== null && tp.profit !== undefined) {
                                        return sum + parseFloat(tp.profit);
                                    }
                                    // Fallback para datos antiguos sin profit guardado
                                    const unitsToSell = tp.units_sold 
                                        ? parseFloat(tp.units_sold)
                                        : (totalRealUnits * tp.percentage) / 100;
                                    return sum + (tp.price - pepp) * unitsToSell;
                                }, 0);
                            }

                            // Calcular duración en días
                            const durationMs = closingDate.getTime() - openingDate.getTime();
                            const durationDays = Math.ceil(durationMs / (1000 * 60 * 60 * 24));

                                id: op.id,
                                crypto: op.crypto,
                                type: op.type,
                                operationType: op.operation_type || 'futuros',
                                leverage: op.leverage || 1,

                                createdAt: op.created_at

                // Fallback: corsproxy.io with API key

                // Fallback 2: allorigins

                    const proxy2 = 'https://api.allorigins.win/get?url=' + encodeURIComponent(urlWithKey);
                    const res = await fetch(proxy2);

            const runDcaSimulation = async () => {
                const { symbol, direction, startDate, endDate, capital, itemBase, leverage } = dcaConfig;
                if (!symbol || !startDate || !capital || !itemBase || !leverage) {
                    setDcaError('Completa todos los campos requeridos'); return;
                }
                if (parseFloat(itemBase) * 2 > parseFloat(capital)) {
                    setDcaError('El capital debe ser al menos 2x el item base'); return;
                }
                setDcaRunning(true);
                setDcaError('');
                setDcaResult(null);
                try {
                    let query = supabaseAdmin
                        .from('price_history')
                        .select('date, open, close')
                        .eq('symbol', symbol)
                        .gte('date', startDate)
                        .order('date', { ascending: true });
                    if (endDate) query = query.lte('date', endDate);
                    const { data: priceData, error } = await query;
                    if (error) throw error;
                    if (!priceData || priceData.length === 0) {
                        setDcaError('No hay datos de precios para ' + symbol + ' en ese rango. Carga los datos primero en Historial Precios.');
                        setDcaRunning(false);
                        return;
                    }
                    const isLong = direction === 'LONG';
                    const cap = parseFloat(capital);
                    const item = parseFloat(itemBase);
                    const lev = parseFloat(leverage);
                    let remaining = cap;
                    let totalMarginUsed = 0;
                    let totalQty = 0;
                    let pepp = null;
                    let started = false;
                    let exhausted = false;
                    let maxDrawdownPct = 0;
                    let liqPrice = null;
                    const entries = [];
                    for (let i = 0; i < priceData.length; i++) {
                        if (exhausted) break;
                        const { date, open: entryPrice, close } = priceData[i];
                        const ep = parseFloat(entryPrice);
                        const cl = parseFloat(close);
                        let profitPct = 0;
                        if (started && pepp) {
                            profitPct = isLong ? (ep - pepp) / pepp * 100 : (pepp - ep) / pepp * 100;
                            maxDrawdownPct = Math.min(maxDrawdownPct, profitPct);
                        }
                        let items = 1;
                        if (!started) {
                            items = 2;
                        } else {
                            const dd = -profitPct;
                            if (dd >= 20) items = 5;
                            else if (dd >= 15) items = 4;
                            else if (dd >= 10) items = 3;
                            else if (dd >= 5) items = 2;
                            else items = 1;
                        }
                        const extraMargin = items >= 5 ? 500 : 0;
                        const margin = items * item + extraMargin;
                        if (margin > remaining) {
                            exhausted = true;
                            const finalPnl = pepp ? totalQty * (isLong ? (cl - pepp) : (pepp - cl)) : 0;
                            entries.push({ date, type: 'AGOTADO', items: 0, margin: 0, entryPrice: ep, pepp, drawdownPct: profitPct, pnlPartial: finalPnl, remainingCapital: remaining, totalMarginUsed, liqPrice, exhausted: true });
                            break;
                        }
                        const qty = (margin * lev) / ep;
                        if (!started) { totalQty = qty; pepp = ep; }
                        else { const nq = totalQty + qty; pepp = (pepp * totalQty + ep * qty) / nq; totalQty = nq; }
                        remaining -= margin;
                        totalMarginUsed += margin;
                        started = true;
                        const imRate = 1 / lev;
                        liqPrice = isLong ? pepp * (1 - imRate) : pepp * (1 + imRate);
                        const pnlPartial = totalQty * (isLong ? (cl - pepp) : (pepp - cl));
                        entries.push({ date, items, margin, entryPrice: ep, pepp, drawdownPct: i > 0 ? profitPct : null, pnlPartial, remainingCapital: remaining, totalMarginUsed, liqPrice, exhausted: false });
                    }
                    const lastRow = priceData[priceData.length - 1];
                    const lastClose = parseFloat(lastRow.close);
                    const finalPnl = pepp ? totalQty * (isLong ? (lastClose - pepp) : (pepp - lastClose)) : 0;
                    const roi = totalMarginUsed > 0 ? (finalPnl / totalMarginUsed) * 100 : 0;
                    setDcaResult({ entries, summary: { symbol, direction, leverage: lev, startDate, endDate: endDate || lastRow.date, totalDays: entries.filter(e => !e.exhausted).length, totalMarginUsed, remainingCapital: remaining, pepp, liqPrice, maxDrawdownPct, finalPnl, roi, exhausted, lastPrice: lastClose, capital: cap, itemBase: item } });
                } catch (err) {
                    setDcaError('Error en simulacion: ' + err.message);
                } finally {
                    setDcaRunning(false);
                }
            };

            const handleExecuteTP = async (tp, isSpot = false, executionDate = null) => {
                // Detectar si es SPOT o usar parámetros específicos
                const operationType = isSpot || selectedOperation.operationType === 'spot' ? 'SPOT' : 'FUTUROS';

                try {
                    console.log(`🎯 Ejecutando TP ${operationType}:`, tp);
                    
                    // Calcular totales para la operación actual
                    const currentTotalUnitsFromEntries = operationEntries.reduce((sum, entry) => sum + parseFloat(entry.units || 0), 0);
                    const currentTotalExecuted = operationEntries.reduce((sum, entry) => sum + parseFloat(entry.executed || 0), 0);
                    const currentTotalIPonderada = operationEntries.reduce((sum, entry) => sum + parseFloat(entry.i_ponderada || 0), 0);
                    const currentTotalMarginFromEntries = operationEntries.reduce((sum, entry) => sum + parseFloat(entry.margin || 0), 0);
                    const currentPEPP = currentTotalExecuted > 0 ? currentTotalIPonderada / currentTotalExecuted : 0;

                    // Aplicar ratio de capital para obtener unidades reales actuales
                    const currentCapitalActual = (parseFloat(selectedOperation.ownCapital) || 0) + (parseFloat(selectedOperation.additionalMargin) || 0);
                    const currentCapitalRatio = currentTotalMarginFromEntries > 0 ? currentCapitalActual / currentTotalMarginFromEntries : 1;
                    const currentTotalUnits = currentTotalUnitsFromEntries * currentCapitalRatio;
                    
                    // Cálculos para la ejecución
                    const unitsToSell = (currentTotalUnits * tp.percentage) / 100;
                    const executedAmount = unitsToSell * tp.price;
                    const profit = (tp.price - currentPEPP) * unitsToSell;
                    
                    console.log('📊 Cálculos TP:', {
                        unitsToSell,
                        executedAmount,
                        profit,
                        currentPEPP: currentPEPP,
                        tpPrice: tp.price

                    // Marcar TP como ejecutado en Supabase con fecha real de ejecución
                    const executionTimestamp = executionDate

                        : new Date().toISOString();
                    
                    // Calcular margen utilizado en esta ejecución
                    const marginUsedForTP = isSpotOp
                        ? ((parseFloat(selectedOperation.ownCapital) || 0) + (parseFloat(selectedOperation.additionalMargin) || 0)) * (tp.percentage / 100)

                    const { error } = await supabaseClient
                        .from('take_profits')
                        .update({ 
                            executed: true,
                            created_at: executionTimestamp,
                            profit: profit,
                            units_sold: unitsToSell,
                            margin_used: marginUsedForTP
                        })
                        .eq('id', tp.id);

                    if (error) throw error;

                    // Actualizar la operación reduciendo el capital proporcionalmente
                    // Para SPOT: solo capital propio, sin apalancamiento
                    const isSpotOp = isSpot || selectedOperation.operationType === 'spot' || selectedOperation.leverage === 1;
                    
                    if (isSpotOp) {
                        // SPOT: Reducir % sobre capital ACTUAL
                        const currentOwnCapital = parseFloat(selectedOperation.ownCapital) || 0;
                        const currentAdditionalMargin = parseFloat(selectedOperation.additionalMargin) || 0;
                        const totalCurrentOwnCapital = currentOwnCapital + currentAdditionalMargin;
                        const reductionPercentage = tp.percentage / 100;
                        const marginToReduce = totalCurrentOwnCapital * reductionPercentage;
                        const newOwnCapital = totalCurrentOwnCapital - marginToReduce;

                        console.log('💰 Actualizando capital SPOT:', {
                            antes: { margen: totalCurrentOwnCapital },
                            reduccion: { porcentaje: tp.percentage + '%', margen: marginToReduce },
                            despues: { margen: newOwnCapital }
                        });

                        const { error: updateError } = await supabaseClient
                            .from('operations')
                            .update({
                                own_capital: newOwnCapital,
                                borrowed_capital: 0,
                                total_investment: newOwnCapital,
                                additional_margin: 0 // DCA consolidado en own_capital tras ejecutar TP
                            })
                            .eq('id', selectedOperation.id);

                        if (updateError) {
                            console.error('⚠️ Error actualizando operación SPOT:', updateError);
                        }
                    } else {
                        // FUTUROS: Reducir % sobre capital ACTUAL
                        const currentOwnCapital = parseFloat(selectedOperation.ownCapital) || 0;
                        const currentAdditionalMargin = parseFloat(selectedOperation.additionalMargin) || 0;
                        const totalCurrentOwnCapital = currentOwnCapital + currentAdditionalMargin;
                        const currentBorrowedCapital = parseFloat(selectedOperation.borrowedCapital) || 0;
                        
                        const reductionPercentage = tp.percentage / 100;
                        const marginToReduce = totalCurrentOwnCapital * reductionPercentage;
                        const leveragedToReduce = currentBorrowedCapital * reductionPercentage;
                        
                        const newOwnCapital = totalCurrentOwnCapital - marginToReduce;
                        const newBorrowedCapital = currentBorrowedCapital - leveragedToReduce;
                        const newTotalInvestment = newOwnCapital + newBorrowedCapital;

                        console.log('💰 Actualizando capital FUTUROS:', {
                            antes: { margen: totalCurrentOwnCapital, prestado: currentBorrowedCapital, total: totalCurrentOwnCapital + currentBorrowedCapital },
                            reduccion: { porcentaje: tp.percentage + '%', margen: marginToReduce, prestado: leveragedToReduce },
                            despues: { margen: newOwnCapital, prestado: newBorrowedCapital, total: newTotalInvestment }
                        });

                        const { error: updateError } = await supabaseClient
                            .from('operations')

                                own_capital: newOwnCapital,

                    // Verificar si la operación debe cerrarse

                    const isSpotOpCheck = isSpot || selectedOperation.operationType === 'spot' || selectedOperation.leverage === 1;
                    
                    // Leer el capital actualizado directamente de Supabase (ya reducido)

                        .from('operations')

                    const capitalRestanteCheck = updatedOpCheck

                        : 0;

                    console.log('📊 Análisis de cierre:', { capitalRestante: capitalRestanteCheck });

                    if (capitalRestanteCheck <= 0.01) {
                        console.log('🎯 Cerrando operación — capital agotado');
                        const { error: closeError } = await supabaseClient
                            .from('operations')

        ReactDOM.render(React.createElement(TradingApp), document.getElementById('root'));
        
        // Chart initialization for Visual Analytics page
        let analyticsCharts = {};
        
        // Global variables for chart data (updated from React)
        window.chartData = {
            spotCapital: 0,
            futuresCapital: 0,
            availableLiquidity: 98500
        };
        
        const initAnalyticsCharts = () => {
            if (document.getElementById('distributionChart')) {
                console.log('📊 Initializing Analytics Charts...');
                
                // Destroy existing charts first
                Object.keys(analyticsCharts).forEach(key => {
                    if (analyticsCharts[key]) {
                        analyticsCharts[key].destroy();
                        delete analyticsCharts[key];
                    }
                });

                Chart.defaults.color = '#A8B2C1';
                Chart.defaults.borderColor = 'rgba(168, 178, 193, 0.1)';
                
                // CHART 1: Distribution
                const ctx1 = document.getElementById('distributionChart');
                if (ctx1) {
                    analyticsCharts.distribution = new Chart(ctx1, {
                        type: 'doughnut',
                        data: {
                            labels: ['SPOT', 'Futuros', 'Liquidez'],
                            datasets: [{
                                data: [
                                    Math.max(window.chartData.spotCapital, 0.1), // SPOT capital (min 0.1 for visibility)
                                    Math.max(window.chartData.futuresCapital, 0.1), // Futuros capital (min 0.1 for visibility)
                                    Math.max(window.chartData.availableLiquidity, 1) // Available liquidity (min 1)
                                ],
                                backgroundColor: ['rgba(136, 212, 152, 0.8)', 'rgba(124, 157, 212, 0.8)', 'rgba(168, 178, 193, 0.6)'],
                                borderColor: ['#88D498', '#7C9DD4', '#A8B2C1'],
                                borderWidth: 2,
                                cutout: '65%'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { 
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: 'rgba(37, 41, 54, 0.95)',
                                    titleColor: '#E8ECEF',
                                    bodyColor: '#A8B2C1',
                                    borderColor: 'rgba(124, 157, 212, 0.3)',
                                    borderWidth: 1,
                                    cornerRadius: 8
                                }
                            }
                        }
                    });
                }
                
                // CHART 2: TP Profits (Dynamic based on configured TPs)
                const ctx2 = document.getElementById('profitsChart');
                if (ctx2) {
                    // Check if TPs are configured
                    const hasTPs = window.chartData && window.chartData.totalTPs > 0;
                    
                    let futuresData, spotData;
                    if (hasTPs && window.chartData.realTPs) {
                        // Use existing projected_profit OR calculate if system hasn't calculated it yet
                        console.log('📊 Usando datos del sistema para TPs:', window.chartData.realTPs);
                        futuresData = [0, 0, 0, 0, 0]; // Default zeros
                        spotData = [0, 0, 0, 0, 0]; // Default zeros
                        
                        window.chartData.realTPs.forEach(tp => {
                            if (tp.level && tp.level <= 5) {
                                const profit = tp.projected_profit || 0;
                                if (profit > 0) {
                                    // ✅ FIX: += para acumular TODAS las operaciones del mismo nivel
                                    if (tp.operationData && tp.operationData.operationType === 'futuros') {
                                        futuresData[tp.level - 1] += Math.round(profit);
                                        console.log(`✅ TP${tp.level} FUTUROS acumulado: $${futuresData[tp.level - 1]}`);
                                    } else if (tp.operationData && tp.operationData.operationType === 'spot') {
                                        spotData[tp.level - 1] += Math.round(profit);
                                        console.log(`✅ TP${tp.level} SPOT acumulado: $${spotData[tp.level - 1]}`);
                                    }
                                }
                            }
                        });
                        
                        console.log('📊 Ganancias finales FUTUROS:', futuresData);
                        console.log('📊 Ganancias finales SPOT:', spotData);
                    } else {
                        // Show zeros when no TPs
                        futuresData = [0, 0, 0, 0, 0];
                        spotData = [0, 0, 0, 0, 0];
                    }
                    
                    analyticsCharts.profits = new Chart(ctx2, {
                        type: 'bar',
                        data: {
                            labels: ['TP1', 'TP2', 'TP3', 'TP4', 'TP5'],
                            datasets: [{
                                label: 'Futuros',
                                data: futuresData,
                                backgroundColor: hasTPs ? 'rgba(124, 157, 212, 0.8)' : 'rgba(124, 157, 212, 0.3)',
                                borderColor: '#7C9DD4',
                                borderWidth: 1,
                                borderRadius: 4
                            }, {
                                label: 'SPOT',
                                data: spotData,
                                backgroundColor: hasTPs ? 'rgba(136, 212, 152, 0.8)' : 'rgba(136, 212, 152, 0.3)',
                                borderColor: '#88D498',
                                borderWidth: 1,
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { 
                                legend: { 
                                    display: true, 
                                    position: 'top',
                                    labels: { color: '#E8ECEF', usePointStyle: true, padding: 15, font: { size: 10 } }
                                }
                            },
                            scales: {
                                x: { grid: { display: false }, ticks: { color: '#A8B2C1', font: { size: 10 } } },
                                y: { 
                                    grid: { color: 'rgba(168, 178, 193, 0.1)' },
                                    ticks: { 
                                        color: '#A8B2C1',
                                        font: { size: 10 },
                                        callback: function(value) { return '$' + value; }
                                    }
                                }
                            }
                        }
                    });
                }
                
                // CHART 3: Capital Released (Dynamic based on TPs)
                const ctx3 = document.getElementById('releasedChart');
                if (ctx3) {
                    const hasTPs = window.chartData && window.chartData.totalTPs > 0;
                    
                    let futuresCapitalData, spotCapitalData;
                    if (hasTPs && window.chartData.realTPs) {
                        futuresCapitalData = [0]; // Inicio = 0
                        let cumulativeRelease = 0;
                        
                        for (let i = 1; i <= 5; i++) {
                            // ✅ FIX: filter() para obtener TODOS los TPs del nivel i, luego sumar
                            const tpsAtLevel = window.chartData.realTPs.filter(tp => 
                                tp.level === i && tp.price > 0 && tp.operationData && tp.operationData.operationType !== 'spot'
                            );
                            let levelRelease = 0;
                            tpsAtLevel.forEach(tp => {
                                const opCapital = (tp.operationData.ownCapital || 0) + (tp.operationData.additionalMargin || 0);
                                levelRelease += opCapital * (tp.percentage / 100);
                                console.log(`💰 TP${i} ${tp.operationData.crypto}: $${Math.round(opCapital * (tp.percentage / 100))}`);
                            });
                            cumulativeRelease += levelRelease;
                            futuresCapitalData.push(Math.round(cumulativeRelease));
                        }
                        
                        // SPOT capital liberado
                        spotCapitalData = [0];
                        let cumulativeReleaseSpot = 0;
                        for (let i = 1; i <= 5; i++) {
                            const tpsAtLevel = window.chartData.realTPs.filter(tp => 
                                tp.level === i && tp.price > 0 && tp.operationData && tp.operationData.operationType === 'spot'
                            );
                            let levelRelease = 0;
                            tpsAtLevel.forEach(tp => {
                                const opCapital = (tp.operationData.ownCapital || 0) + (tp.operationData.additionalMargin || 0);
                                levelRelease += opCapital * (tp.percentage / 100);
                            });
                            cumulativeReleaseSpot += levelRelease;
                            spotCapitalData.push(Math.round(cumulativeReleaseSpot));
                        }
                        
                        console.log('📊 Capital liberado Futuros:', futuresCapitalData);
                        console.log('📊 Capital liberado SPOT:', spotCapitalData);
                    } else {
                        futuresCapitalData = [0, 0, 0, 0, 0, 0];
                        spotCapitalData = [0, 0, 0, 0, 0, 0];
                    }
                    
                    analyticsCharts.released = new Chart(ctx3, {
                        type: 'line',
                        data: {
                            labels: ['Inicio', 'TP1', 'TP2', 'TP3', 'TP4', 'TP5'],
                            datasets: [{
                                label: 'Futuros',
                                data: futuresCapitalData,
                                borderColor: '#7C9DD4',
                                backgroundColor: 'rgba(124, 157, 212, 0.2)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 2,
                                pointRadius: 3
                            }, {
                                label: 'SPOT',
                                data: spotCapitalData,
                                borderColor: '#88D498', 
                                backgroundColor: 'rgba(136, 212, 152, 0.2)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 2,
                                pointRadius: 3
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { 
                                legend: { 
                                    display: true, 
                                    position: 'top',
                                    labels: { color: '#E8ECEF', usePointStyle: true, padding: 15, font: { size: 10 } }
                                }
                            },
                            scales: {
                                x: { grid: { color: 'rgba(168, 178, 193, 0.1)' }, ticks: { color: '#A8B2C1', font: { size: 10 } } },
                                y: { 
                                    grid: { color: 'rgba(168, 178, 193, 0.1)' },
                                    ticks: { 
                                        color: '#A8B2C1',
                                        font: { size: 10 },
                                        callback: function(value) { return '$' + value.toLocaleString(); }
                                    }
                                }
                            }
                        }
                    });
                }
                
                console.log('✅ Analytics Charts initialized successfully');
            }
        };
        
        // Check for analytics page and initialize charts
        let lastAnalyticsCheck = false;
        setInterval(() => {
            const isAnalytics = !!document.getElementById('distributionChart');
            // Only initialize if we just arrived at analytics page (state changed)
            if (isAnalytics && !lastAnalyticsCheck) {
                setTimeout(initAnalyticsCharts, 300);
            }
            lastAnalyticsCheck = isAnalytics;
        }, 500);
    </script>
