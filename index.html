window.renderProjChartFn = function(capital, r, totalOps, step) {
    var canvas = document.getElementById('proj-chart-canvas');
    if (!canvas) return;
    var labels = ['Inicio'], dataC = [capital], dataL = [capital], dataF = [capital];
    for (var op = 1; op <= totalOps; op++) {
        if (op % step === 0 || op === totalOps) {
            var yn = op / (52 / (totalOps > 0 ? totalOps : 1));
            labels.push(op === totalOps ? 'Final' : Math.round(op) + 'op');
            dataC.push(capital * Math.pow(1 + r, op));
            dataL.push(capital + capital * r * op);
            dataF.push(capital);
        }
    }
    if (window._projChart) { try { window._projChart.destroy(); } catch(e) {} }
    window._projChart = new Chart(canvas, {
        type: 'line',
        data: { labels: labels, datasets: [
            { label: 'Compuesto', data: dataC, borderColor: '#A78BFA', backgroundColor: 'rgba(167,139,250,0.08)', borderWidth: 2.5, fill: true, tension: 0.4, pointRadius: 0, pointHoverRadius: 5 },

        // ============================================================
        // FUNCIÓN CENTRALIZADA DE CÁLCULO DE PEPP
        // Fórmula: ejecutado_restante / unidades_restantes
        // Considera ventas parciales (TPs ejecutados con units_sold)
        // ============================================================
        const calcPEPP = (entries, executedTPs) => {
            if (!entries || entries.length === 0) return 0;

            // Totales brutos de todas las entries
            const totalExecuted = entries.reduce((s, e) => s + parseFloat(e.executed || 0), 0);
            const totalUnits    = entries.reduce((s, e) => s + parseFloat(e.units || 0), 0);
            if (totalUnits <= 0) return 0;

            // PEPP base (sin ajuste por ventas)
            const peppBase = totalExecuted / totalUnits;

            // Si no hay TPs ejecutados, devolver PEPP base
            if (!executedTPs || executedTPs.length === 0) {
                return peppBase;
            }

            // Restar unidades y ejecutado de cada TP parcial vendido
            let unitsSold = 0;
            for (const tp of executedTPs) {
                const u = parseFloat(tp.units_sold || 0);
                if (u > 0) unitsSold += u;
            }

            // Unidades restantes tras ventas
            const unitsRemaining = totalUnits - unitsSold;
            if (unitsRemaining <= 0) return peppBase; // toda la posición vendida

            // Ejecutado proporcional restante
            const executedRemaining = peppBase * unitsRemaining;

            return executedRemaining / unitsRemaining; // = peppBase, pero base para nuevas entradas post-venta

            // NOTA: el PEPP real post-venta + nuevas entradas se calcula abajo
            // Este return solo aplica si no hay entradas nuevas después del TP
        };

        // Versión completa que recalcula correctamente con entradas post-venta
        const calcPEPPFull = (entries, executedTPs) => {
            if (!entries || entries.length === 0) return { pepp: 0, totalUnits: 0, totalExecuted: 0 };

            // Ordenar entries y TPs por fecha para procesar cronológicamente
            const sortedEntries = [...entries].sort((a, b) => new Date(a.created_at || 0) - new Date(b.created_at || 0));
            const sortedTPs = executedTPs ? [...executedTPs].filter(t => parseFloat(t.units_sold || 0) > 0)
                .sort((a, b) => new Date(a.created_at || 0) - new Date(b.created_at || 0)) : [];

            // Si no hay TPs ejecutados, cálculo simple
            if (sortedTPs.length === 0) {
                const totalExec  = entries.reduce((s, e) => s + parseFloat(e.executed || 0), 0);
                const totalUnits = entries.reduce((s, e) => s + parseFloat(e.units || 0), 0);
                return { pepp: totalUnits > 0 ? totalExec / totalUnits : 0, totalUnits, totalExecuted: totalExec };
            }

            // Procesar cronológicamente: acumular entradas, descontar ventas
            let accExec  = 0;
            let accUnits = 0;
            let entryIdx = 0;
            let tpIdx    = 0;

            // Mezclar entradas y TPs en orden cronológico
            const events = [];
            for (const e of sortedEntries) {
                events.push({ type: 'entry', date: new Date(e.created_at || 0), data: e });
            }
            for (const t of sortedTPs) {
                events.push({ type: 'tp', date: new Date(t.created_at || 0), data: t });
            }
            events.sort((a, b) => a.date - b.date);

            for (const ev of events) {
                if (ev.type === 'entry') {
                    accExec  += parseFloat(ev.data.executed || 0);
                    accUnits += parseFloat(ev.data.units || 0);
                } else {
                    // Venta parcial: descontar unidades y ejecutado proporcional
                    const unitsSold = parseFloat(ev.data.units_sold || 0);
                    if (unitsSold > 0 && accUnits > 0) {
                        const ratio = unitsSold / accUnits;
                        accExec  -= accExec  * ratio;
                        accUnits -= unitsSold;
                        if (accUnits < 0) accUnits = 0;
                        if (accExec  < 0) accExec  = 0;
                    }
                }
            }

            const pepp = accUnits > 0 ? accExec / accUnits : 0;
            return { pepp, totalUnits: accUnits, totalExecuted: accExec };
        };

                const days = Math.floor(totalHours / 24);

            const numValue = parseFloat(value) || 0;
            
            // Valores muy pequeños (< 0.01): buscar dígitos significativos, hasta 10 decimales
            if (numValue > 0 && numValue < 0.01) {
                const str = numValue.toString();
                const decimalPart = str.split('.')[1] || '';
                let significantDecimals = 0;
                
                for (let i = 0; i < decimalPart.length; i++) {
                    if (decimalPart[i] !== '0') {
                        significantDecimals = Math.min(i + 4, 10); // +4 dígitos tras el primero significativo, máx 10
                        break;
                    }
                }
                
                return new Intl.NumberFormat('es-ES', { 
                    style: 'currency', 
                    currency: 'USD',
                    minimumFractionDigits: significantDecimals,
                    maximumFractionDigits: significantDecimals
                }).format(numValue);
            }
            
            // Valores entre 0.01 y 1: 4 decimales (ej: 0.7816 en vez de 0.78)
            if (numValue > 0 && numValue < 1) {
                return new Intl.NumberFormat('es-ES', { 
                    style: 'currency', 
                    currency: 'USD',
                    minimumFractionDigits: 4,
                    maximumFractionDigits: 4
                }).format(numValue);
            }
            
            // Valores >= 1: 2 decimales mínimo, más si hay dígitos significativos
            // Ej: 1.36 → 1,36 US$ | 1.3584 → 1,3584 US$ | 150.07 → 150,07 US$
            const rounded2 = Math.round(numValue * 100) / 100;

                    currency: 'USD',
                    minimumFractionDigits: 2,

                            .eq('operation_id', op.id);

                        if (!entriesError && entries && entries.length > 0) {
                            // Calcular totales REALES de todas las entradas DCA
                            const totalRealMargin = entries.reduce((sum, entry) => sum + parseFloat(entry.margin || 0), 0);
                            const totalRealExecuted = entries.reduce((sum, entry) => sum + parseFloat(entry.executed || 0), 0);
                            const totalRealUnits = entries.reduce((sum, entry) => sum + parseFloat(entry.units || 0), 0);
                            const totalRealLeveraged = totalRealExecuted - totalRealMargin;
                            
                            // PEPP (Precio Entrada Promedio Ponderado) - CORREGIDO
                            const totalIPonderada = entries.reduce((sum, entry) => {
                                const executed = parseFloat(entry.executed || 0);
                                const price = parseFloat(entry.entry_price || 0);
                                return sum + (executed * price);
                            }, 0);
                            // PEPP correcto: ejecutado_total / unidades_totales
                            const pepp = totalRealUnits > 0 ? totalRealExecuted / totalRealUnits : 0;

                            // Calcular fechas de apertura y cierre
                            const entryDates = entries.map(e => new Date(e.created_at)).sort((a, b) => a - b);
                            const openingDate = entryDates[0]; // Primera entrada DCA

                            // Buscar fecha del último TP ejecutado
                            const { data: executedTPs, error: tpError } = await supabaseClient
                                .from('take_profits')
                                .select('percentage, price, executed, created_at, profit, units_sold')
                                .eq('operation_id', op.id)
                                .eq('executed', true)
                                .order('created_at', { ascending: false });

                            let closingDate = openingDate;
                            let totalPnL = 0;
                            
                            if (!tpError && executedTPs && executedTPs.length > 0) {
                                const lastTPDate = executedTPs[0].created_at;
                                closingDate = lastTPDate && lastTPDate !== null 
                                    ? new Date(lastTPDate) 
                                    : new Date(op.created_at);

                                totalPnL = executedTPs.reduce((sum, tp) => {
                                    if (tp.profit !== null && tp.profit !== undefined) {
                                        return sum + parseFloat(tp.profit);
                                    }
                                    // Fallback para datos antiguos sin profit guardado
                                    const unitsToSell = tp.units_sold 
                                        ? parseFloat(tp.units_sold)
                                        : (totalRealUnits * tp.percentage) / 100;
                                    return sum + (tp.price - pepp) * unitsToSell;
                                }, 0);
                            }

                // Fallback: corsproxy.io with API key

                    if (res.ok) return await res.json();

                    const dayMap = {};
                    (data || []).forEach(row => {
                        if (!dayMap[row.date]) dayMap[row.date] = { date: row.date, open: null, close: null, high: -Infinity, low: Infinity };
                        const d = dayMap[row.date];
                        if (row.hour === 0) d.open = row.open;
                        d.close = row.close;
                        if (row.high > d.high) d.high = row.high;
                        if (row.low < d.low) d.low = row.low;
                    });
                    const daily = Object.values(dayMap)
                        .map(d => ({ ...d, high: d.high === -Infinity ? null : d.high, low: d.low === Infinity ? null : d.low }))
                        .sort((a,b) => b.date.localeCompare(a.date));
                    setPriceHistory(daily);
                } catch (err) {
                    console.error('Error loading price history:', err);
                    setPhError('Error cargando historial: ' + err.message);
                } finally {
                    setPhLoading(false);
                }
            };

            const fetchAndStoreHistory = async (symbol) => {
                const cgId = COINGECKO_IDS[symbol];
                if (!cgId) { setPhError('No hay ID de CoinGecko para ' + symbol); return; }

                setPhLoading(true);
                setPhLoadingAsset(symbol);
                setPhError('');
                setPhLoadProgress(0);

                try {
                    const url = 'https://api.coingecko.com/api/v3/coins/' + cgId + '/market_chart?vs_currency=usd&days=365&interval=daily&x_cg_demo_api_key=' + COINGECKO_API_KEY;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('CoinGecko error ' + res.status);
                    const data = await res.json();

                    // Deduplicate by date BEFORE upsert to avoid ON CONFLICT error
                    const dayMap = {};
                    (data.prices || []).forEach(([ts, price], i) => {
                        const date = new Date(ts).toISOString().slice(0, 10);
                        const prevPrice = i === 0 ? price : data.prices[i - 1][1];
                        if (!dayMap[date]) {
                            dayMap[date] = { open: prevPrice, close: price };
                        } else {
                            dayMap[date].close = price;
                        }
                    });

                    const rows = Object.entries(dayMap).map(([date, v]) => ({
                        symbol, date, open: v.open, close: v.close, source: 'CoinGecko'
                    }));

                    setPhLoadProgress(50);

                    const batchSize = 50;
                    for (let i = 0; i < rows.length; i += batchSize) {
                        const batch = rows.slice(i, i + batchSize);
                        const { error } = await supabaseAdmin
                            .from('price_history')
                            .upsert(batch, { onConflict: 'symbol,date' });
                        if (error) throw error;
                        setPhLoadProgress(50 + Math.round((i / rows.length) * 50));
                    }

                    setPhLoadProgress(100);
                    await loadPriceHistory(symbol);
                } catch (err) {
                    setPhError('Error cargando ' + symbol + ': ' + err.message);
                } finally {
                    setPhLoading(false);
                    setPhLoadingAsset('');

            };

            const fetchAndStoreHourlyHistory = async (symbol, days = 90) => {
                const asset = assets.find(a => a.symbol === symbol);
                const cgId = asset?.coingecko_id || COINGECKO_IDS[symbol];
                if (!cgId) { setPhError('No hay ID de CoinGecko para ' + symbol); return; }

                setPhHourlyLoading(true);

                setPhHourlyProgress(0);

                    const url = 'https://api.coingecko.com/api/v3/coins/' + cgId + 
                        '/market_chart?vs_currency=usd&days=' + days + '&interval=hourly&x_cg_pro_api_key=' + COINGECKO_API_KEY;
                    const res = await fetch(url);
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error('CoinGecko Pro error ' + res.status + ': ' + errText);
                    }
                    const data = await res.json();

                    setPhHourlyProgress(40);

                    // Build hourly rows — prices array is [timestamp, price]
                    // Group into OHLC by hour
                    const hourMap = {};
                    const prices = data.prices || [];

                    prices.forEach(([ts, price]) => {
                        const d = new Date(ts);
                        const date = d.toISOString().slice(0, 10);
                        const hour = d.getUTCHours();
                        const key = date + '_' + hour;
                        if (!hourMap[key]) {
                            hourMap[key] = { date, hour, open: price, high: price, low: price, close: price };
                        } else {
                            hourMap[key].close = price;
                            if (price > hourMap[key].high) hourMap[key].high = price;
                            if (price < hourMap[key].low) hourMap[key].low = price;
                        }
                    });

                        coingecko_id: cgId,
                        date: r.date,
                        hour: r.hour,
                        open: r.open,
                        high: r.high,
                        low: r.low,
                        close: r.close
                    }));

                    // Upsert in batches
                    const batchSize = 100;
                    for (let i = 0; i < rows.length; i += batchSize) {
                        const batch = rows.slice(i, i + batchSize);
                        const { error } = await supabaseAdmin

                            .upsert(batch, { onConflict: 'user_id,symbol,date,hour' });

            // Endpoint: GET https://api.binance.com/api/v3/klines
            // Params: symbol, interval (1h/4h/1d), startTime, endTime, limit

            const BINANCE_BASE = 'https://api.binance.com/api/v3';

            const binanceFetch = async (url) => {
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('Binance error ' + res.status);
                    return await res.json();
                } catch(e) {
                    // Fallback via proxy si hay CORS
                    try {
                        const proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);
                        const res = await fetch(proxy);
                        if (!res.ok) throw new Error('Proxy error ' + res.status);
                        return await res.json();
                    } catch(e2) {
                        throw new Error('Binance fetch failed: ' + e2.message);
                    }
                }
            };

            // Importar velas horarias desde Binance para un símbolo
            // Binance devuelve: [openTime, open, high, low, close, volume, ...]
            const fetchAndStoreBinanceHourly = async (symbol, days = 90) => {
                setPhHourlyLoading(true);
                setPhHourlyAsset(symbol);
                setPhError('');
                setPhHourlyProgress(0);

                try {
                    const pair = symbol + 'USDT';
                    const endTime = Date.now();
                    const startTime = endTime - (days * 24 * 60 * 60 * 1000);

                    // Binance limit = 1000 velas por request, 1h = 1000h ≈ 41 días
                    // Para 90 días necesitamos ~3 requests, para 365 días ~9 requests
                    const allKlines = [];
                    let currentStart = startTime;
                    const intervalMs = 60 * 60 * 1000; // 1 hora

                    while (currentStart < endTime) {
                        const url = BINANCE_BASE + '/klines?symbol=' + pair +
                            '&interval=1h&startTime=' + currentStart +
                            '&endTime=' + endTime + '&limit=1000';
                        const klines = await binanceFetch(url);
                        if (!klines || klines.length === 0) break;
                        allKlines.push(...klines);
                        currentStart = klines[klines.length - 1][0] + intervalMs;
                        setPhHourlyProgress(Math.round((allKlines.length / (days * 24)) * 50));
                        if (klines.length < 1000) break;
                        await new Promise(r => setTimeout(r, 200)); // rate limit
                    }

                    setPhHourlyProgress(50);

                    // Convertir a rows para Supabase
                    const rows = allKlines.map(k => {
                        const d = new Date(k[0]);
                        return {
                            user_id: getCurrentUserId(),
                            symbol,

            const fetchAllBinanceHourly = async (days = 90) => {

            // ─────────────────────────────────────────────────────────────────

            // ============================================================
            // BINANCE API — datos OHLC horarios gratuitos sin API key
            // ============================================================
            // Convertir símbolo del sistema al par Binance (BTCUSDT, etc.)
            const toBinanceSymbol = (symbol) => {
                const overrides = {
                    'SHIB': 'SHIBUSDT', 'SHIBA': 'SHIBUSDT',
                    'RENDER': 'RENDERUSDT', 'HYPE': 'HYPEUSDT',
                    'XAUT': 'XAUTUSDT', 'NIGHT': 'NIGHTUSDT',
                    'ASTER': 'ASTERUSDT'
                };
                return overrides[symbol] || symbol + 'USDT';
            };

            // Fetch velas OHLC desde Binance
            // interval: '1h', '4h', '1d', '1w', '5m', '15m', etc.
            // limit: máximo 1000 por llamada
            const fetchBinanceKlines = async (symbol, interval, startTime, endTime, limit = 1000) => {
                const pair = toBinanceSymbol(symbol);
                let url = BINANCE_BASE + '/klines?symbol=' + pair + '&interval=' + interval + '&limit=' + limit;
                if (startTime) url += '&startTime=' + startTime;
                if (endTime) url += '&endTime=' + endTime;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Binance error ' + res.status + ' para ' + pair);
                const data = await res.json();
                // Binance kline: [openTime, open, high, low, close, volume, closeTime, ...]
                return data.map(k => ({
                    openTime: k[0],
                    open: parseFloat(k[1]),
                    high: parseFloat(k[2]),
                    low: parseFloat(k[3]),
                    close: parseFloat(k[4]),
                    closeTime: k[6]
                }));
            };

            // Importar datos horarios desde Binance y guardar en price_history_hourly
            const fetchAndStoreHourlyBinance = async (symbol, days = 90, silent = false, forceUserId = null) => {
                if (!silent) { setPhHourlyLoading(true); setPhHourlyAsset(symbol); setPhError(''); setPhHourlyProgress(0); }

                try {
                    const asset = assets.find(a => a.symbol === symbol);
                    const cgId = asset?.coingecko_id || COINGECKO_IDS[symbol] || symbol.toLowerCase();
                    const uid = forceUserId || getCurrentUserId();

                    // Check last date already loaded — incremental update
                    const { data: lastRow } = await supabaseAdmin
                        .from('price_history_hourly')
                        .select('date')
                        .eq('user_id', uid)
                        .eq('symbol', symbol)
                        .order('date', { ascending: false })
                        .limit(1)
                        .maybeSingle();

                    const msPerHour = 3600000;
                    const endTime = Date.now();
                    let startTime;

                    if (lastRow?.date) {
                        // Already has data — check last hour loaded
                        const { data: lastHourRow } = await supabaseAdmin
                            .from('price_history_hourly')
                            .select('date, hour')
                            .eq('user_id', uid)
                            .eq('symbol', symbol)
                            .order('date', { ascending: false })
                            .order('hour', { ascending: false })
                            .limit(1)
                            .maybeSingle();

                        const lastHour = lastHourRow?.hour ?? 23;
                        const lastDateTime = new Date(lastRow.date + 'T' + String(lastHour).padStart(2,'0') + ':00:00Z');
                        const hoursSinceLast = (endTime - lastDateTime.getTime()) / msPerHour;

                        if (hoursSinceLast < 1) {
                            // Less than 1 hour since last candle — skip
                            if (!silent) { setPhHourlyProgress(100); setTimeout(() => { setPhHourlyLoading(false); setPhHourlyAsset(''); }, 500); }
                            console.log('✅ ' + symbol + ' al día (última vela hace ' + hoursSinceLast.toFixed(1) + 'h)');
                            return 0;
                        }
                        // Load from last candle onwards
                        startTime = lastDateTime.getTime();
                        if (!silent) console.log('📦 ' + symbol + ': ' + Math.floor(hoursSinceLast) + ' velas nuevas desde ' + lastRow.date + ' hora ' + lastHour);
                    } else {
                        // No data — load full period
                        const totalHours = days * 24;
                        startTime = endTime - (totalHours * msPerHour);
                        if (!silent) console.log('📦 ' + symbol + ': carga completa ' + days + ' días');
                    }

                    setPhHourlyProgress(10);

                    let allKlines = [];
                    let batchStart = startTime;
                    let batchNum = 0;
                    // Estimate total batches for progress bar
                    const estimatedHours = Math.ceil((endTime - startTime) / 3600000);
                    const totalBatches = Math.ceil(estimatedHours / 1000) || 1;

                    while (batchStart < endTime) {
                        const klines = await fetchBinanceKlines(symbol, '1h', batchStart, endTime, 1000);
                        if (klines.length === 0) break;
                        allKlines = allKlines.concat(klines);
                        batchStart = klines[klines.length - 1].closeTime + 1;
                        batchNum++;
                        setPhHourlyProgress(10 + Math.round((batchNum / totalBatches) * 50));
                        if (klines.length < 1000) break;
                        await new Promise(r => setTimeout(r, 200)); // pequeña pausa
                    }

                    setPhHourlyProgress(60);

                    // Convert to DB rows
                    const rows = allKlines.map(k => {
                        const d = new Date(k.openTime);
                        return {
                            user_id: uid,
                            symbol,
                            coingecko_id: cgId,
                            date: d.toISOString().slice(0, 10),
                            hour: d.getUTCHours(),
                            open: k.open,
                            high: k.high,
                            low: k.low,
                            close: k.close
                        };
                    });

                    // Upsert in batches of 100
                    const batchSize = 100;
                    for (let i = 0; i < rows.length; i += batchSize) {
                        const batch = rows.slice(i, i + batchSize);
                        const { error } = await supabaseAdmin
                            .from('price_history_hourly')
                            .upsert(batch, { onConflict: 'user_id,symbol,date,hour' });
                        if (error) throw error;
                        setPhHourlyProgress(60 + Math.round((i / rows.length) * 40));
                    }

                    setPhHourlyProgress(100);
                    console.log('✅ Binance hourly cargado para ' + symbol + ': ' + rows.length + ' registros');
                    return rows.length;

                } catch (err) {
                    setPhError('Error Binance ' + symbol + ': ' + err.message);

                    setPhHourlyLoading(false);
                    setPhHourlyAsset('');

                    total += count;
                    if (i < symbols.length - 1) await new Promise(r => setTimeout(r, 500));

            // ===== END PRICE HISTORY =====
            // ===== DCA SIMULATOR =====
            const runDcaSimulation = async () => {
                const { symbol, direction, startDate, endDate, capital, itemBase, leverage } = dcaConfig;
                if (!symbol || !startDate || !capital || !itemBase || !leverage) {
                    setDcaError('Completa todos los campos requeridos'); return;
                }
                if (parseFloat(itemBase) * 2 > parseFloat(capital)) {
                    setDcaError('El capital debe ser al menos 2x el item base'); return;
                }
                setDcaRunning(true);
                setDcaError('');
                setDcaResult(null);
                try {
                    // Determinar horas de entrada según intervalo y sesión/hora inicio
                    const interval = dcaConfig.interval || '1d';
                    const intervalHours = interval === '1h' ? 1 : interval === '2h' ? 2 : interval === '4h' ? 4 : interval === '8h' ? 8 : interval === '12h' ? 12 : 24;
                    const isSubDaily = intervalHours < 24;

                    // Para diario: usar sesión. Para sub-diario: usar startHour
                    const sessionHour = isSubDaily
                        ? (parseInt(dcaConfig.startHour) || 0)
                        : (dcaConfig.session === 'open_london' ? 8 : dcaConfig.session === 'open_ny' ? 14 : 0);

                    // Calcular todas las horas de entrada del día
                    const entryHours = isSubDaily
                        ? Array.from({ length: Math.floor(24 / intervalHours) }, (_, i) => (sessionHour + i * intervalHours) % 24).sort((a,b) => a-b)
                        : [sessionHour];

                    // Traer todas las velas del rango y filtrar por fecha+hora exacta
                    const endHour = dcaConfig.endHour !== undefined ? parseInt(dcaConfig.endHour) : 23;

                    let query = supabaseAdmin
                        .from('price_history_hourly')
                        .select('date, hour, open, close, high, low')
                        .eq('user_id', getCurrentUserId())
                        .eq('symbol', symbol)
                        .gte('date', startDate)
                        .order('date', { ascending: true })
                        .order('hour', { ascending: true });
                    if (endDate) query = query.lte('date', endDate);
                    const { data: rawData, error } = await query;
                    if (error) throw error;

                    // Filtrar por fecha+hora exacta de inicio y fin + horas del intervalo
                    const filteredRaw = (rawData || []).filter(r => {
                        // Primer día: solo desde sessionHour (hora de inicio)
                        if (r.date === startDate && r.hour < sessionHour) return false;
                        // Último día: solo hasta endHour
                        if (endDate && r.date === endDate && r.hour > endHour) return false;
                        // Solo incluir horas que corresponden al intervalo
                        return entryHours.includes(r.hour);
                    });
                    const priceData = (filteredRaw || rawData || []).map(r => ({
                        ...r,
                        timestamp: r.date + ' ' + String(r.hour).padStart(2,'0') + ':00'
                    }));
                    const isLong = direction === 'LONG';
                    const cap = parseFloat(capital);
                    const item = parseFloat(itemBase);
                    const lev = parseFloat(leverage);
                    const marginMode = dcaConfig.marginMode || 'default';
                    let remaining = cap;
                    let totalMarginUsed = 0;
                    let totalMarginAdded = 0; // solo reducción de apalancamiento
                    let totalQty = 0;
                    let effectiveLev = lev; // apalancamiento efectivo actual
                    let pepp = null;
                    let started = false;
                    let exhausted = false;
                    let maxDrawdownPct = 0;
                    let liqPrice = null;
                    const entries = [];
                    for (let i = 0; i < priceData.length; i++) {
                        if (exhausted) break;
                        const { date, hour, open: entryPrice, close, timestamp } = priceData[i];
                        const ep = parseFloat(entryPrice);
                        const cl = parseFloat(close);
                        let profitPct = 0;
                        if (started && pepp) {
                            profitPct = isLong ? (ep - pepp) / pepp * 100 : (pepp - ep) / pepp * 100;
                            maxDrawdownPct = Math.min(maxDrawdownPct, profitPct);
                        }
                        const dd = started ? -profitPct : 0;

                        // Determinar ítems DCA y margen adicional según modo
                        let items = 1;
                        let extraMarginDCA = 0;
                        let marginReduction = 0; // para reducir apalancamiento

                        if (!started) {
                            items = 2;
                        } else if (marginMode === 'default') {
                            // Comportamiento original
                            if (dd >= 20) items = 5;
                            else if (dd >= 15) items = 4;
                            else if (dd >= 10) items = 3;
                            else if (dd >= 5) items = 2;
                            else items = 1;
                            extraMarginDCA = items >= 5 ? 500 : 0;
                        } else if (marginMode === 'both') {
                            // Espejo exacto: mismas balas DCA van también a escudo
                            if (dd >= 20) { items = 5; extraMarginDCA = 500; marginReduction = items * item + 500; }
                            else if (dd >= 15) { items = 4; marginReduction = items * item; }
                            else if (dd >= 10) { items = 3; marginReduction = items * item; }
                            else if (dd >= 5) { items = 2; marginReduction = items * item; }
                            else { items = 1; marginReduction = items * item; }
                        } else if (marginMode === 'margin_only') {
                            // >10%: solo reducción de margen, no DCA extra
                            if (dd >= 20) { items = 1; marginReduction = item * 4 + 500; }
                            else if (dd >= 15) { items = 1; marginReduction = item * 3; }
                            else if (dd >= 10) { items = 1; marginReduction = item * 2; }
                            else if (dd >= 5) items = 2;
                            else items = 1;
                        }

                        const dcaMargin = items * item + extraMarginDCA;
                        const totalNeeded = dcaMargin + marginReduction;

                        if (totalNeeded > remaining) {
                            exhausted = true;
                            const finalPnl = pepp ? totalQty * (isLong ? (cl - pepp) : (pepp - cl)) : 0;
                            entries.push({ date, type: 'AGOTADO', items: 0, margin: 0, marginReduction: 0, entryPrice: ep, pepp, drawdownPct: profitPct, pnlPartial: finalPnl, remainingCapital: remaining, totalMarginUsed, liqPrice, exhausted: true });
                            break;
                        }

                        // Aplicar DCA (compra)
                        if (dcaMargin > 0) {
                            const qty = (dcaMargin * lev) / ep;
                            if (!started) { totalQty = qty; pepp = ep; }
                            else { const nq = totalQty + qty; pepp = (pepp * totalQty + ep * qty) / nq; totalQty = nq; }
                            totalMarginUsed += dcaMargin;
                        }

                        // Aplicar reducción de margen (sube margen, baja apalancamiento efectivo)
                        if (marginReduction > 0 && started) {
                            totalMarginUsed += marginReduction;
                            totalMarginAdded += marginReduction;
                        }

                        // Recalcular effectiveLev después de cualquier cambio (DCA o escudo)
                        if (totalMarginUsed > 0 && totalQty > 0) {
                            effectiveLev = Math.max(1, (totalQty * ep) / totalMarginUsed);
                        }

                        remaining -= totalNeeded;
                        started = true;
                        // Usar effectiveLev para liquidación — si hay escudo, el apalancamiento real es menor
                        const imRate = 1 / effectiveLev;
                        liqPrice = isLong ? pepp * (1 - imRate) : pepp * (1 + imRate);
                        const pnlPartial = totalQty * (isLong ? (cl - pepp) : (pepp - cl));
                        entries.push({
                            date, hour: hour || 0, timestamp: timestamp || date,
                            items, margin: dcaMargin, marginReduction,
                            entryPrice: marginReduction > 0 && dcaMargin === 0 ? null : ep,
                            pepp, drawdownPct: i > 0 ? profitPct : null,
                            pnlPartial, remainingCapital: remaining,
                            totalMarginUsed, liqPrice, exhausted: false,
                            effectiveLev: parseFloat(effectiveLev.toFixed(2))
                        });
                    }
                    const lastRow = priceData[priceData.length - 1];
                    const lastClose = parseFloat(lastRow.close);
                    const finalPnl = pepp ? totalQty * (isLong ? (lastClose - pepp) : (pepp - lastClose)) : 0;
                    const roi = totalMarginUsed > 0 ? (finalPnl / totalMarginUsed) * 100 : 0;
                    setDcaResult({ entries, summary: { symbol, direction, leverage: lev, startDate, endDate: endDate || lastRow.date, totalDays: new Set(entries.filter(e => !e.exhausted).map(e => e.date)).size, totalMarginUsed, totalMarginAdded, remainingCapital: remaining, pepp, liqPrice, maxDrawdownPct, finalPnl, roi, exhausted, lastPrice: lastClose, capital: cap, itemBase: item, marginMode, session: (!dcaConfig.interval || dcaConfig.interval === '1d') ? (dcaConfig.session || 'open_day') : 'custom', interval: dcaConfig.interval || '1d',
                        startHour: dcaConfig.startHour || 0, endHour: dcaConfig.endHour !== undefined ? dcaConfig.endHour : 23 } });

            // ===== DCA OPERACIONAL =====

                    const currentCapitalRatio = currentTotalMarginFromEntries > 0 ? currentCapitalActual / currentTotalMarginFromEntries : 1;
                    const currentTotalUnits = currentTotalUnitsFromEntries * currentCapitalRatio;
                    
                    // Cálculos para la ejecución
                    const unitsToSell = (currentTotalUnits * tp.percentage) / 100;
                    const executedAmount = unitsToSell * tp.price;
                    const profit = (tp.price - currentPEPP) * unitsToSell;

                        executedAmount,

                    if (isSpotOp) {

                        const currentOwnCapital = parseFloat(selectedOperation.ownCapital) || 0;

                        const totalCurrentOwnCapital = currentOwnCapital + currentAdditionalMargin;
                        const reductionPercentage = tp.percentage / 100;
                        const marginToReduce = totalCurrentOwnCapital * reductionPercentage;
                        const newOwnCapital = totalCurrentOwnCapital - marginToReduce;

                        console.log('💰 Actualizando capital SPOT:', {
                            antes: { margen: totalCurrentOwnCapital },

                                borrowed_capital: 0,

                        const totalCurrentOwnCapital = currentOwnCapital + currentAdditionalMargin;
                        const currentBorrowedCapital = parseFloat(selectedOperation.borrowedCapital) || 0;
                        
                        const reductionPercentage = tp.percentage / 100;
                        const marginToReduce = totalCurrentOwnCapital * reductionPercentage;
                        const leveragedToReduce = currentBorrowedCapital * reductionPercentage;

                        .order('hour', { ascending: false })

                    const allCandles = (data || []).reverse().map(r => ({ date: r.date, hour: r.hour, close: parseFloat(r.close) }));
                    candles = allCandles.filter(c => (c.hour - startHour) % intervalH === 0 || c.hour === startHour);
                }

                if (candles.length < maxPeriod + 2) {
                    return { symbol, signal: null, ema1val: null, ema2val: null, crossDate: null, crossPrice: null, crosses: [], error: 'Sin datos suficientes' };
                }

                const closes = candles.map(c => c.close);
                const ema1arr = calcEMA(closes, ema1);
                const ema2arr = calcEMA(closes, ema2);

                // Align arrays by idx
                const ema2map = {};
                ema2arr.forEach(e => { ema2map[e.idx] = e.value; });
                const ema2aligned = ema1arr.map(e => ({ idx: e.idx, value: ema2map[e.idx] || null })).filter(e => e.value !== null);
                const ema1aligned = ema1arr.filter(e => ema2map[e.idx] !== undefined);

                const lastE1 = ema1aligned[ema1aligned.length - 1];
                const lastE2 = ema2aligned[ema2aligned.length - 1];
                const currentSignal = lastE1 && lastE2
                    ? (lastE1.value > lastE2.value ? 'LONG' : 'SHORT')
                    : null;

                const crosses = detectCrosses(ema1aligned, ema2aligned, candles);
                const lastCross = crosses[0] || null;

                return {
                    symbol,
                    signal: currentSignal,
                    ema1val: lastE1 ? lastE1.value : null,
                    ema2val: lastE2 ? lastE2.value : null,
                    crossDate: lastCross ? lastCross.date : null,
                    crossPrice: lastCross ? lastCross.price : null,

            const bingxRequest = async (method, path, params = {}) => {

            const openBotOperation = async (symbol, direction, crossDate, crossHour, crossPrice, cfg) => {
                const userId = DEFAULT_ADMIN_USER_ID;
                const tp1price = direction === 'LONG'
                    ? crossPrice * (1 + parseFloat(cfg.tp1) / 100)
                    : crossPrice * (1 - parseFloat(cfg.tp1) / 100);
                const tp2price = direction === 'LONG'
                    ? crossPrice * (1 + parseFloat(cfg.tp2) / 100)
                    : crossPrice * (1 - parseFloat(cfg.tp2) / 100);
                const tp3size = 100 - cfg.tp1size - cfg.tp2size;
                const tp3price = direction === 'LONG'
                    ? crossPrice * (1 + parseFloat(cfg.tp3) / 100)
                    : crossPrice * (1 - parseFloat(cfg.tp3) / 100);

                // Abrir en BingX
                let bingxOrderId = null;
                try {
                    await bingxSetLeverage(symbol + '-SWAP', cfg.leverage);
                    const side = direction === 'LONG' ? 'BUY' : 'SELL';

                    const qty = notional / crossPrice;
                    const order = await bingxPlaceOrder(symbol + '-SWAP', side, qty);
                    bingxOrderId = order?.data?.order?.orderId || null;

                    // TPs en BingX
                    const qty1 = qty * (cfg.tp1size / 100);
                    const qty2 = qty * (cfg.tp2size / 100);
                    const qty3 = qty * (tp3size / 100);
                    await bingxPlaceTpOrder(symbol + '-SWAP', direction, tp1price, qty1);
                    await bingxPlaceTpOrder(symbol + '-SWAP', direction, tp2price, qty2);
                    await bingxPlaceTpOrder(symbol + '-SWAP', direction, tp3price, qty3);

                return data;
            };

            const bingxGetKlines = async (symbol, interval, limit) => {
                var cleanSym = symbol.replace('-SWAP','').replace('-USDT-SWAP','-USDT');
                if (!cleanSym.includes('-')) cleanSym = cleanSym + '-USDT';
                const data = await bingxRequest('GET', '/openApi/swap/v3/quote/klines', {
                    symbol: cleanSym, interval, limit: (limit || 300).toString()
                });
                var raw = [];
                if (data && Array.isArray(data.data)) raw = data.data;
                else if (data && data.data && Array.isArray(data.data.klines)) raw = data.data.klines;
                else if (Array.isArray(data)) raw = data;
                else { console.warn('BingX klines unexpected format:', JSON.stringify(data).slice(0,200)); return []; }
                return raw.map(function(k) {
                    var ts = parseInt(k.time || k.t || k[0]);
                    var d = new Date(ts);
                    return { ts: ts, date: d.toISOString().slice(0,10), hour: d.getUTCHours(), close: parseFloat(k.close||k.c||k[4]), open: parseFloat(k.open||k.o||k[1]), high: parseFloat(k.high||k.h||k[2]), low: parseFloat(k.low||k.l||k[3]) };
                }).filter(function(k){ return !isNaN(k.close); }).reverse();
            };

            const tfToBingx = (tf) => ({ '1m':'1m','3m':'3m','5m':'5m','15m':'15m','30m':'30m','1h':'1h','2h':'2h','4h':'4h','6h':'6h','8h':'8h','12h':'12h','1d':'1d','1w':'1w' }[tf] || '1h');

            const calcEMALocal = (prices, period) => {
                if (prices.length < period) return [];
                var k = 2/(period+1), ema = prices.slice(0,period).reduce(function(a,b){return a+b;},0)/period;
                var emas = [{ idx: period-1, value: ema }];
                for (var i = period; i < prices.length; i++) { ema = prices[i]*k + ema*(1-k); emas.push({ idx: i, value: ema }); }
                return emas;
            };

            const detectCrossesLocal = (ema1arr, ema2arr, candles) => {
                var crosses = [];
                for (var i = 1; i < ema1arr.length; i++) {
                    var prev1=ema1arr[i-1].value, prev2=ema2arr[i-1]?ema2arr[i-1].value:null;
                    var curr1=ema1arr[i].value, curr2=ema2arr[i]?ema2arr[i].value:null;
                    if (!prev2||!curr2) continue;
                    var candle = candles[ema1arr[i].idx];
                    if (!candle) continue;
                    if (prev1<=prev2 && curr1>curr2) crosses.push({ date:candle.date, hour:candle.hour, price:candle.close, signal:'LONG' });
                    else if (prev1>=prev2 && curr1<curr2) crosses.push({ date:candle.date, hour:candle.hour, price:candle.close, signal:'SHORT' });
                }
                return crosses.reverse();
            };

            const runEMAForSymbolBingX = async (symbol, cfg) => {
                try {
                    var candles = await bingxGetKlines(symbol, tfToBingx(cfg.tf), 300);
                    if (!candles || candles.length < 30) return { symbol:symbol, signal:null, lastPrice:null, crosses:[], error:'Sin datos' };
                    var closes = candles.map(function(c){return c.close;});
                    var ema1arr = calcEMALocal(closes, cfg.ema1||12);
                    var ema2arr = calcEMALocal(closes, cfg.ema2||25);
                    var ema2map = {};
                    ema2arr.forEach(function(e){ ema2map[e.idx]=e.value; });
                    var ema2al = ema1arr.map(function(e){ return {idx:e.idx,value:ema2map[e.idx]||null}; }).filter(function(e){return e.value!==null;});
                    var ema1al = ema1arr.filter(function(e){ return ema2map[e.idx]!==undefined; });
                    var lastE1=ema1al[ema1al.length-1], lastE2=ema2al[ema2al.length-1];
                    var signal = lastE1&&lastE2 ? (lastE1.value>lastE2.value?'LONG':'SHORT') : null;
                    var crosses = detectCrossesLocal(ema1al, ema2al, candles);
                    return { symbol:symbol, signal:signal, lastPrice:candles[candles.length-1].close, crosses:crosses.slice(0,5), error:null };
                } catch(e) {
                    return { symbol:symbol, signal:null, lastPrice:null, crosses:[], error:e.message };
                }
            };

            const runMarketScan = async (cfg, assets) => {
                setMarketScanLoading(true);
                try {
                    var long=[], short=[], none=[];
                    for (var si=0; si<assets.length; si++) {
                        var symbol = assets[si];
                        if (si>0) await new Promise(function(r){ setTimeout(r,200); });
                        try {
                            var result = await runEMAForSymbolBingX(symbol, cfg);
                            var lastCross = result.crosses && result.crosses.length>0 ? result.crosses[0] : null;
                            var crossStatus = null;
                            if (lastCross) {
                                var crossTs = new Date(lastCross.date+'T'+String(lastCross.hour).padStart(2,'0')+':00:00Z').getTime();
                                crossStatus = (Date.now()-crossTs)/3600000 <= 48 ? 'new' : 'old';
                            }
                            var item = { symbol:symbol, signal:result.signal, lastPrice:result.lastPrice, crossDate:lastCross?lastCross.date:null, crossHour:lastCross?lastCross.hour:null, crossPrice:lastCross?lastCross.price:null, crossStatus:crossStatus, hoursAgo:lastCross?Math.round((Date.now()-new Date(lastCross.date+'T'+String(lastCross.hour).padStart(2,'0')+':00:00Z').getTime())/3600000):null, error:result.error };
                            if (result.signal==='LONG') long.push(item);
                            else if (result.signal==='SHORT') short.push(item);
                            else none.push(item);
                        } catch(e) {
                            none.push({ symbol:symbol, error:e.message, lastPrice:null, signal:null, crossStatus:null });
                        }
                    }
                    setMarketScan({ long:long, short:short, none:none });
                    setMarketScanTs(new Date());
                } finally { setMarketScanLoading(false); }
            };

                        const botCycle = async (cfg, assets) => {
                botAddLog('Iniciando ciclo — ' + assets.length + ' activos', 'info');
                const userId = DEFAULT_ADMIN_USER_ID;

                // Contar operaciones abiertas
                const { data: openOps } = await supabase
                    supabaseClient.from('ema_bot_operations')
                    .select('id, symbol, direction')
                    .eq('user_id', userId)
                    .eq('status', 'open');
                const openCount = (openOps || []).length;
                const slotsAvailable = cfg.maxOps - openCount;

                if (slotsAvailable <= 0) {
                    botAddLog('Sin slots disponibles (' + openCount + '/' + cfg.maxOps + ')', 'warn');
                    return;
                }

                let newOps = 0;
                for (const symbol of assets) {
                    if (newOps >= slotsAvailable) break;

                    try {
                        const result = await runEMAForSymbolBingX(symbol, cfg);
                        if (!result || !result.crosses || result.crosses.length === 0) continue;

                        const lastCross = result.crosses[0];
                        const alreadyDone = await isCrossAlreadyProcessed(
                            symbol, lastCross.direction, lastCross.date, lastCross.hour,
                            cfg.tf, cfg.ema1, cfg.ema2
                        );
                        if (alreadyDone) continue;

                        botAddLog('🎯 Nuevo cruce ' + lastCross.signal + ' en ' + symbol + ' @ ' + lastCross.price?.toFixed(4), 'success');
                        await markCrossProcessed(symbol, lastCross.signal, lastCross.date, lastCross.hour, cfg.tf, cfg.ema1, cfg.ema2, lastCross.price);
                        await openBotOperation(symbol, lastCross.signal, lastCross.date, lastCross.hour, lastCross.price, cfg);
                        newOps++;
                    } catch(e) {
                        botAddLog('Error en ' + symbol + ': ' + e.message, 'error');
                    }
                }

                if (newOps === 0) botAddLog('Sin nuevos cruces detectados', 'info');
                else botAddLog(newOps + ' operación(es) abiertas', 'success');
            };

                const bear = vals.filter(v => v === 'bearish').length;

                    setAtHistorialDias(data || []);

                    }

            // ============================================================

            // ============================================================

            // ============================================================
            if (currentView === 'ema-strategy') {
                var allSymbolsBot = [...new Set(assets.map(function(a){return a.symbol;}))].sort();
                var tfOpts = [{v:'15m',l:'15 min'},{v:'30m',l:'30 min'},{v:'1h',l:'1 hora'},{v:'4h',l:'4 horas'},{v:'1d',l:'1 día'}];

                padding: '4px',
                marginBottom: '1.5rem',
            },
            tab: {
                flex: 1,
                padding: '0.75rem 1.5rem',
                background: 'transparent',
                border: 'none',
                borderRadius: '6px',
                color: '#A8B2C1',
                fontWeight: '500',
                cursor: 'pointer',
                transition: 'all 0.2s',
            },
            tabActive: {
                background: 'rgba(124, 157, 212, 0.15)',
                color: '#7C9DD4',
                fontWeight: '600',
            },
            tabContent: {
                // Content is shown/hidden via conditional rendering
            },
            
            // ESTILOS BOTONES DE ACCIÓN
            actionButtons: {
                display: 'flex',
                gap: '0.5rem',
                flexWrap: 'wrap'
            },

            // ESTILOS SELECTOR DE TIPO DE OPERACIÓN
            operationTypeSelector: {
                marginBottom: '2rem'
            },
            typeToggle: {
                display: 'grid',
                gridTemplateColumns: '1fr 1fr',
                gap: '1rem',
                marginTop: '0.5rem'
            },
            typeOption: {
                display: 'flex',
                alignItems: 'center',
                gap: '1rem',
                padding: '1.5rem',
                background: 'rgba(37, 41, 54, 0.6)',
                border: '1px solid rgba(168, 178, 193, 0.1)',
                borderRadius: '12px',
                cursor: 'pointer',
                transition: 'all 0.2s ease',
                textAlign: 'left'
            },
            typeOptionActive: {
                background: 'rgba(124, 157, 212, 0.08)',
                borderColor: 'rgba(124, 157, 212, 0.3)',
                transform: 'translateY(-2px)',
                boxShadow: '0 4px 12px rgba(124, 157, 212, 0.1)'
            },
            typeIcon: {
                fontSize: '2rem',
                minWidth: '3rem',
                textAlign: 'center'
            },
            typeTitle: {
                fontSize: '1.1rem',
                fontWeight: '600',
                color: '#E8ECEF',
                marginBottom: '0.25rem'
            },
            typeDescription: {
                fontSize: '0.9rem',
                color: '#A8B2C1'
            },
            dynamicForm: {
                textAlign: 'center',
                padding: '2rem',
                background: 'rgba(37, 41, 54, 0.3)',
                borderRadius: '12px',
                marginTop: '2rem'
            },
            operationInfo: {
                color: '#A8B2C1',
                fontSize: '1rem',
                marginBottom: '2rem',
                lineHeight: '1.5'
            },
            continueBtn: {
                padding: '1rem 2rem',
                background: 'linear-gradient(135deg, #7C9DD4, #88D498)',
                border: 'none',
                borderRadius: '8px',
                color: '#1a1d29',
                fontSize: '1rem',
                fontWeight: '600',
                cursor: 'pointer',
                transition: 'transform 0.2s',
                minWidth: '200px'
            },
        };

        ReactDOM.render(React.createElement(TradingApp), document.getElementById('root'));
        
        // Chart initialization for Visual Analytics page
        let analyticsCharts = {};
        
        // Global variables for chart data (updated from React)
        window.chartData = {
            spotCapital: 0,
            futuresCapital: 0,
            availableLiquidity: 98500
        };
        
        const initAnalyticsCharts = () => {
            if (document.getElementById('distributionChart')) {
                console.log('📊 Initializing Analytics Charts...');
                
                // Destroy existing charts first
                Object.keys(analyticsCharts).forEach(key => {
                    if (analyticsCharts[key]) {
                        analyticsCharts[key].destroy();
                        delete analyticsCharts[key];
                    }
                });

                Chart.defaults.color = '#A8B2C1';
                Chart.defaults.borderColor = 'rgba(168, 178, 193, 0.1)';
                
                // CHART 1: Distribution
                const ctx1 = document.getElementById('distributionChart');
                if (ctx1) {
                    analyticsCharts.distribution = new Chart(ctx1, {
                        type: 'doughnut',
                        data: {
                            labels: ['SPOT', 'Futuros', 'Escudo', 'DCA', 'Liquidez'],
                            datasets: [{
                                data: [
                                    Math.max(window.chartData.spotCapital, 0.1),
                                    Math.max(window.chartData.futuresCapital, 0.1),
                                    Math.max(window.chartData.escudoCapital || 0, 0.1),
                                    Math.max(window.chartData.dcaCapital || 0, 0.1),
                                    Math.max(window.chartData.availableLiquidity, 1)
                                ],
                                backgroundColor: ['rgba(136,212,152,0.8)', 'rgba(124,157,212,0.8)', 'rgba(244,216,150,0.8)', 'rgba(167,139,250,0.8)', 'rgba(168,178,193,0.6)'],
                                borderColor: ['#88D498', '#7C9DD4', '#F4D896', '#A78BFA', '#A8B2C1'],
                                borderWidth: 2,
                                cutout: '65%'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { 
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: 'rgba(37, 41, 54, 0.95)',
                                    titleColor: '#E8ECEF',
                                    bodyColor: '#A8B2C1',
                                    borderColor: 'rgba(124, 157, 212, 0.3)',
                                    borderWidth: 1,
                                    cornerRadius: 8
                                }
                            }
                        }
                    });
                }
                
                // CHART 2: TP Profits (Dynamic based on configured TPs)
                const ctx2 = document.getElementById('profitsChart');
                if (ctx2) {
                    // Check if TPs are configured
                    const hasTPs = window.chartData && window.chartData.totalTPs > 0;
                    
                    let futuresData, spotData;
                    if (hasTPs && window.chartData.realTPs) {
                        // Use existing projected_profit OR calculate if system hasn't calculated it yet
                        console.log('📊 Usando datos del sistema para TPs:', window.chartData.realTPs);
                        futuresData = [0, 0, 0, 0, 0]; // Default zeros
                        spotData = [0, 0, 0, 0, 0]; // Default zeros
                        
                        window.chartData.realTPs.forEach(tp => {
                            if (tp.level && tp.level <= 5) {
                                const profit = tp.projected_profit || 0;
                                if (profit > 0) {
                                    // ✅ FIX: += para acumular TODAS las operaciones del mismo nivel
                                    if (tp.operationData && tp.operationData.operationType === 'futuros') {
                                        futuresData[tp.level - 1] += Math.round(profit);
                                        console.log(`✅ TP${tp.level} FUTUROS acumulado: $${futuresData[tp.level - 1]}`);
                                    } else if (tp.operationData && tp.operationData.operationType === 'spot') {
                                        spotData[tp.level - 1] += Math.round(profit);
                                        console.log(`✅ TP${tp.level} SPOT acumulado: $${spotData[tp.level - 1]}`);
                                    }
                                }
                            }
                        });
                        
                        console.log('📊 Ganancias finales FUTUROS:', futuresData);
                        console.log('📊 Ganancias finales SPOT:', spotData);
                    } else {
                        // Show zeros when no TPs
                        futuresData = [0, 0, 0, 0, 0];
                        spotData = [0, 0, 0, 0, 0];
                    }
                    
                    analyticsCharts.profits = new Chart(ctx2, {
                        type: 'bar',
                        data: {
                            labels: ['TP1', 'TP2', 'TP3', 'TP4', 'TP5'],
                            datasets: [{
                                label: 'Futuros',
                                data: futuresData,
                                backgroundColor: hasTPs ? 'rgba(124, 157, 212, 0.8)' : 'rgba(124, 157, 212, 0.3)',
                                borderColor: '#7C9DD4',
                                borderWidth: 1,
                                borderRadius: 4
                            }, {
                                label: 'SPOT',
                                data: spotData,
                                backgroundColor: hasTPs ? 'rgba(136, 212, 152, 0.8)' : 'rgba(136, 212, 152, 0.3)',
                                borderColor: '#88D498',
                                borderWidth: 1,
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { 
                                legend: { 
                                    display: true, 
                                    position: 'top',
                                    labels: { color: '#E8ECEF', usePointStyle: true, padding: 15, font: { size: 10 } }
                                }
                            },
                            scales: {
                                x: { grid: { display: false }, ticks: { color: '#A8B2C1', font: { size: 10 } } },
                                y: { 
                                    grid: { color: 'rgba(168, 178, 193, 0.1)' },
                                    ticks: { 
                                        color: '#A8B2C1',
                                        font: { size: 10 },
                                        callback: function(value) { return '$' + value; }
                                    }
                                }
                            }
                        }
                    });
                }
                
                // CHART 3: Capital Released (Dynamic based on TPs)
                const ctx3 = document.getElementById('releasedChart');
                if (ctx3) {
                    const hasTPs = window.chartData && window.chartData.totalTPs > 0;
                    
                    let futuresCapitalData, spotCapitalData;
                    if (hasTPs && window.chartData.realTPs) {
                        futuresCapitalData = [0]; // Inicio = 0
                        let cumulativeRelease = 0;
                        
                        for (let i = 1; i <= 5; i++) {
                            // ✅ FIX: filter() para obtener TODOS los TPs del nivel i, luego sumar
                            const tpsAtLevel = window.chartData.realTPs.filter(tp => 
                                tp.level === i && tp.price > 0 && tp.operationData && tp.operationData.operationType !== 'spot'
                            );
                            let levelRelease = 0;
                            tpsAtLevel.forEach(tp => {
                                const opCapital = (tp.operationData.ownCapital || 0) + (tp.operationData.additionalMargin || 0);
                                levelRelease += opCapital * (tp.percentage / 100);
                                console.log(`💰 TP${i} ${tp.operationData.crypto}: $${Math.round(opCapital * (tp.percentage / 100))}`);
                            });
                            cumulativeRelease += levelRelease;
                            futuresCapitalData.push(Math.round(cumulativeRelease));
                        }
                        
                        // SPOT capital liberado
                        spotCapitalData = [0];
                        let cumulativeReleaseSpot = 0;
                        for (let i = 1; i <= 5; i++) {
                            const tpsAtLevel = window.chartData.realTPs.filter(tp => 
                                tp.level === i && tp.price > 0 && tp.operationData && tp.operationData.operationType === 'spot'
                            );
                            let levelRelease = 0;
                            tpsAtLevel.forEach(tp => {
                                const opCapital = (tp.operationData.ownCapital || 0) + (tp.operationData.additionalMargin || 0);
                                levelRelease += opCapital * (tp.percentage / 100);
                            });
                            cumulativeReleaseSpot += levelRelease;
                            spotCapitalData.push(Math.round(cumulativeReleaseSpot));
                        }
                        
                        console.log('📊 Capital liberado Futuros:', futuresCapitalData);
                        console.log('📊 Capital liberado SPOT:', spotCapitalData);
                    } else {
                        futuresCapitalData = [0, 0, 0, 0, 0, 0];
                        spotCapitalData = [0, 0, 0, 0, 0, 0];
                    }
                    
                    analyticsCharts.released = new Chart(ctx3, {
                        type: 'line',
                        data: {
                            labels: ['Inicio', 'TP1', 'TP2', 'TP3', 'TP4', 'TP5'],
                            datasets: [{
                                label: 'Futuros',
                                data: futuresCapitalData,
                                borderColor: '#7C9DD4',
                                backgroundColor: 'rgba(124, 157, 212, 0.2)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 2,
                                pointRadius: 3
                            }, {
                                label: 'SPOT',
                                data: spotCapitalData,
                                borderColor: '#88D498', 
                                backgroundColor: 'rgba(136, 212, 152, 0.2)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 2,
                                pointRadius: 3
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { 
                                legend: { 
                                    display: true, 
                                    position: 'top',
                                    labels: { color: '#E8ECEF', usePointStyle: true, padding: 15, font: { size: 10 } }
                                }
                            },
                            scales: {
                                x: { grid: { color: 'rgba(168, 178, 193, 0.1)' }, ticks: { color: '#A8B2C1', font: { size: 10 } } },
                                y: { 
                                    grid: { color: 'rgba(168, 178, 193, 0.1)' },
                                    ticks: { 
                                        color: '#A8B2C1',
                                        font: { size: 10 },
                                        callback: function(value) { return '$' + value.toLocaleString(); }
                                    }
                                }
                            }
                        }
                    });
                }
                
                console.log('✅ Analytics Charts initialized successfully');
            }
        };
        
        // Check for analytics page and initialize charts
        let lastAnalyticsCheck = false;
        setInterval(() => {
            const isAnalytics = !!document.getElementById('distributionChart');
            // Only initialize if we just arrived at analytics page (state changed)
            if (isAnalytics && !lastAnalyticsCheck) {
                setTimeout(initAnalyticsCharts, 300);
            }
            lastAnalyticsCheck = isAnalytics;
        }, 500);


    </script>
    <!-- Chart overlay - outside React, controlled by JS -->
    <div id="chart-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#1a1d29; z-index:999; flex-direction:column;">
        <div id="chart-overlay-header" style="background:#252836; border-bottom:1px solid #3a3f52; padding:0.8rem 1.2rem; display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
            <button onclick="window.closeChart()" style="background:rgba(168,178,193,0.1); border:1px solid rgba(168,178,193,0.2); color:#A8B2C1; borderRadius:8px; padding:0.4rem 0.9rem; cursor:pointer; fontSize:0.88rem;">← Dashboard</button>
            <select id="chart-symbol-select" style="background:#1a1d29; border:1px solid #3a3f52; color:#E8ECEF; borderRadius:6px; padding:0.3rem 0.6rem; fontSize:0.88rem;"></select>
            <div id="chart-interval-btns" style="display:flex; gap:0.4rem;"></div>
            <span id="chart-source-label" style="color:#555e7a; fontSize:0.78rem; margin-left:auto;"></span>
        </div>
        <div id="chart-container" style="flex:1; width:100%;"></div>
    </div>

    <script>
    (function() {
        var _chart = null;
        var _ro = null;
        var _currentSymbol = 'BTC';
        var _currentInterval = '1d';
        var _symbols = [];
        var _intervals = [
            {label:'1m',value:'1m'},{label:'5m',value:'5m'},{label:'15m',value:'15m'},
            {label:'1h',value:'1h'},{label:'4h',value:'4h'},{label:'1D',value:'1d'},{label:'1W',value:'1w'}
        ];

window.openChart = function(symbols, symbol, interval) {
            _symbols = symbols || [];
            _currentSymbol = symbol || 'BTC';
            _currentInterval = interval || '1d';

            // Build symbol select
            var sel = document.getElementById('chart-symbol-select');
            sel.innerHTML = '';
            _symbols.forEach(function(s) {
                var opt = document.createElement('option');
                opt.value = s; opt.textContent = s;
                if (s === _currentSymbol) opt.selected = true;
                sel.appendChild(opt);
            });
            sel.onchange = function() { _currentSymbol = this.value; renderChart(); updateIntervalBtns(); };

            // Build interval buttons
            updateIntervalBtns();

            // Show overlay
            var overlay = document.getElementById('chart-overlay');
            overlay.style.display = 'flex';
            document.getElementById('root').style.display = 'none';

            renderChart();
        };

        window.closeChart = function() {
            destroyChart();
            document.getElementById('chart-overlay').style.display = 'none';
            document.getElementById('root').style.display = 'block';
            // Notify React
            if (window._reactSetView) window._reactSetView('dashboard');
        };

        function updateIntervalBtns() {
            var container = document.getElementById('chart-interval-btns');
            container.innerHTML = '';
            _intervals.forEach(function(iv) {
                var btn = document.createElement('button');
                btn.textContent = iv.label;
                btn.style.cssText = _currentInterval === iv.value
                    ? 'background:rgba(124,157,212,0.25);border:1px solid rgba(124,157,212,0.5);color:#7C9DD4;border-radius:6px;padding:0.3rem 0.7rem;cursor:pointer;font-size:0.82rem;font-weight:700;'
                    : 'background:rgba(168,178,193,0.05);border:1px solid rgba(168,178,193,0.15);color:#A8B2C1;border-radius:6px;padding:0.3rem 0.7rem;cursor:pointer;font-size:0.82rem;';
                btn.onclick = function() { _currentInterval = iv.value; updateIntervalBtns(); renderChart(); };
                container.appendChild(btn);
            });
            document.getElementById('chart-source-label').textContent = 'Binance: ' + _currentSymbol + 'USDT';
        }

        function destroyChart() {
            if (_chart) { try { _chart.remove(); } catch(e) {} _chart = null; }
            if (_ro) { _ro.disconnect(); _ro = null; }
            var c = document.getElementById('chart-container');
            if (c) c.innerHTML = '';
        }

        async function renderChart() {
            var container = document.getElementById('chart-container');
            if (!container) return;
            destroyChart();
            container.innerHTML = '<div style="color:#A8B2C1;text-align:center;padding:3rem;font-size:1rem;">Cargando grafico...</div>';
            document.getElementById('chart-source-label').textContent = 'Binance: ' + _currentSymbol + 'USDT';

            try {
                if (!window.LightweightCharts) {
                    await new Promise(function(res, rej) {
                        var s = document.createElement('script');
                        s.src = 'https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js';
                        s.onload = res; s.onerror = rej;
                        document.head.appendChild(s);
                    });
                }

                var sym = _currentSymbol + 'USDT';
                var iv = _currentInterval;
                var urls = [
                    'https://api.binance.com/api/v3/klines?symbol=' + sym + '&interval=' + iv + '&limit=500',
                    'https://api1.binance.com/api/v3/klines?symbol=' + sym + '&interval=' + iv + '&limit=500',
                    'https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.binance.com/api/v3/klines?symbol=' + sym + '&interval=' + iv + '&limit=500'),
                    'https://corsproxy.io/?' + encodeURIComponent('https://api.binance.com/api/v3/klines?symbol=' + sym + '&interval=' + iv + '&limit=500'),
                ];

                var data = null;
                for (var i = 0; i < urls.length; i++) {
                    try {
                        var res = await fetch(urls[i]);
                        if (res.ok) {
                            var raw = await res.json();
                            data = raw.contents ? JSON.parse(raw.contents) : raw;
                            if (Array.isArray(data) && data.length > 0) break;
                        }
                    } catch(e) { continue; }
                }

                if (!data || !Array.isArray(data) || data.length === 0) {
                    container.innerHTML = '<div style="color:#F4A9A8;text-align:center;padding:3rem;">No se encontraron datos para ' + _currentSymbol + '</div>';
                    return;
                }

                var candles = data.map(function(d) {
                    return { time: Math.floor(d[0]/1000), open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]) };
                });

                container.innerHTML = '';
                _chart = LightweightCharts.createChart(container, {
                    width: container.clientWidth, height: container.clientHeight || window.innerHeight - 80,
                    layout: { background: { color: '#1a1d29' }, textColor: '#A8B2C1' },
                    grid: { vertLines: { color: '#2a2d3e' }, horzLines: { color: '#2a2d3e' } },
                    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                    rightPriceScale: { borderColor: '#3a3f52' },
                    timeScale: { borderColor: '#3a3f52', timeVisible: true, secondsVisible: false },
                });

                var series = _chart.addCandlestickSeries({
                    upColor: '#88D498', downColor: '#F4A9A8',
                    borderUpColor: '#88D498', borderDownColor: '#F4A9A8',
                    wickUpColor: '#88D498', wickDownColor: '#F4A9A8',
                });
                series.setData(candles);
                _chart.timeScale().fitContent();

                _ro = new ResizeObserver(function() {
                    if (_chart) _chart.applyOptions({ width: container.clientWidth, height: container.clientHeight || window.innerHeight - 80 });
                });
                _ro.observe(container);

            } catch(err) {
                container.innerHTML = '<div style="color:#F4A9A8;text-align:center;padding:3rem;">Error: ' + err.message + '</div>';
            }
        }
    })();
    </script>
